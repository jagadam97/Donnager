---
version: "2.1"
services:
  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8191}
      - PROXY_SERVER=${PROXY_SERVER:-}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
      - TZ=Asia/Kolkata
    ports:
      - "8192:8191"
    restart: unless-stopped
